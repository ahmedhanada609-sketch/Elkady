<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELkady store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. الشاشة الافتتاحية (Splash Screen) -->
    <div id="splash-screen">
        <div class="logo-container">
            <h1 class="logo-text">ELkady store</h1>
        </div>
    </div>

    <!-- 2. الموقع الرئيسي للمشتري -->
    <div id="main-site" class="hidden">
        <header>
            <h2 class="site-title">ELkady store</h2>
            <div class="cart-box" id="cart-bin">
                🛒 <span id="cart-count">0</span>
            </div>
        </header>

        <!-- أزرار الأقسام الـ 3 -->
        <div class="tabs-container">
            <button class="tab-button active" onclick="switchTab('headphones')">سماعات</button>
            <button class="tab-button" onclick="switchTab('cables')">وصلات</button>
            <button class="tab-button" onclick="switchTab('cases')">جرابات</button>
        </div>

        <!-- شبكة عرض المنتجات -->
        <main class="products-grid">
            <!-- قسم السماعات -->
            <div id="headphones" class="tab-content active">
                <div class="product-card" data-name="سماعة M10" data-price="150">
                    <img src="images/m10.jpg" alt="M10" class="product-image">
                    <h3 class="product-title">سماعة M10</h3>
                    <p class="product-price">150 ج.م</p>
                    <button class="buy-button" onclick="addToCart(this)">شراء</button>
                </div>
            </div>
            
            <!-- قسم الوصلات -->
            <div id="cables" class="tab-content" style="display:none;">
                <div class="product-card" data-name="وصلة مايكرو" data-price="30">
                    <img src="images/micro.jpg" alt="Micro" class="product-image">
                    <h3 class="product-title">وصلة مايكرو</h3>
                    <p class="product-price">30 ج.م</p>
                    <button class="buy-button" onclick="addToCart(this)">شراء</button>
                </div>
            </div>

            <!-- قسم الجرابات -->
            <div id="cases" class="tab-content" style="display:none;">
                <div class="product-card" data-name="جراب آيفون" data-price="150">
                    <img src="images/iphone_case.jpg" alt="Case" class="product-image">
                    <h3 class="product-title">جراب آيفون</h3>
                    <p class="product-price">150 ج.م</p>
                    <button class="buy-button" onclick="addToCart(this)">شراء</button>
                </div>
            </div>
        </main>

        <!-- المساعد الذكي والسير المتحرك -->
        <div class="conveyor-belt-line"></div>
        <div class="assistant-wrapper">
            <div class="assistant-character" onclick="annoyAssistant()">👤</div>
            <div class="speech-bubble" id="bubble">احنا في وقت شغل!!</div>
        </div>

        <footer style="text-align: center; margin-top: 40px; padding-bottom: 20px;">
            <a href="#admin" onclick="openAdmin()" style="color: #ffd700; text-decoration: none; font-weight: bold;">لوحة التحكم (صاحب المتجر)</a>
        </footer>
    </div>

    <!-- استدعاء السكريبت المظبوط -->
    <script src="Alaa.js"></script>
</body>
</html>
